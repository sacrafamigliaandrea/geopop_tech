<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Geopop Tech — Random videolezioni</title>
<link rel="icon" href="logo.png" />
<link rel="apple-touch-icon" href="logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@500;700;800;900&family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet" />
<style>
/* ============ TEMA GEOPOP (identità dedicata a questa app) ============ */
:root{
  --navy-900:#0A1330;      /* fondo profondo */
  --navy-800:#0E1B3A;
  --navy-700:#152449;
  --navy-600:#1D2F5C;
  --line:#2A3B6B;
  --giallo:#FFD400;        /* giallo segnale Geopop */
  --giallo-scuro:#E6BE00;
  --ciano:#37C8EF;         /* accento azzurro */
  --ciano-scuro:#1FA7CC;
  --verde:#2FBF71;         /* feedback positivo */
  --ambra:#FFB020;         /* feedback "riprova" (mai rosso) */
  --testo:#EAF0FF;
  --testo-soft:#AFC0E6;
  --card:#101E42;
  --card-2:#0C1836;
  --ombra:0 18px 50px rgba(0,0,0,.45);
  --radius:20px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Atkinson Hyperlegible',system-ui,sans-serif;
  font-size:18px;
  line-height:1.55;
  color:var(--testo);
  background:
    radial-gradient(1200px 700px at 12% -8%, rgba(55,200,239,.16), transparent 60%),
    radial-gradient(1000px 700px at 100% 0%, rgba(255,212,0,.12), transparent 55%),
    var(--navy-900);
  -webkit-font-smoothing:antialiased;
  min-height:100%;
}
h1,h2,h3,.font-title{font-family:'Lexend',sans-serif;letter-spacing:-.01em}

/* ============ Layout generale ============ */
.wrap{max-width:1240px;margin:0 auto;padding:26px 26px 60px}

/* ---- Header ---- */
header.top{
  display:flex;align-items:center;justify-content:space-between;
  gap:18px;flex-wrap:wrap;margin-bottom:26px;
}
.brand{display:flex;align-items:center;gap:14px}
.brand .mark{
  width:52px;height:52px;border-radius:14px;flex:0 0 auto;
  background:var(--giallo);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 22px rgba(255,212,0,.28);
}
.brand .mark svg{width:30px;height:30px;display:block}
.brand .txt b{
  font-family:'Lexend',sans-serif;font-weight:900;font-size:22px;
  display:block;line-height:1.05;color:#fff;letter-spacing:-.02em;
}
.brand .txt span{font-size:13.5px;color:var(--testo-soft);font-weight:700;letter-spacing:.02em}
.top .kicker{
  font-family:'Lexend',sans-serif;font-weight:800;font-size:13px;
  text-transform:uppercase;letter-spacing:.14em;
  color:var(--navy-900);background:var(--giallo);
  padding:8px 14px;border-radius:999px;
}

/* ============ SCHERMATA SLOT ============ */
#slotScreen{display:block}
.hero-head{text-align:center;margin:6px auto 26px;max-width:760px}
.hero-head h1{font-size:clamp(30px,5vw,50px);font-weight:900;line-height:1.02;color:#fff}
.hero-head h1 .hl{color:var(--giallo)}
.hero-head p{margin-top:14px;color:var(--testo-soft);font-size:19px}

.machine{
  max-width:560px;margin:0 auto;
  background:linear-gradient(180deg,var(--card) 0%,var(--card-2) 100%);
  border:1px solid var(--line);
  border-radius:26px;
  box-shadow:var(--ombra);
  padding:26px 26px 30px;
  position:relative;overflow:hidden;
}
.machine::before{
  content:"";position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(180deg,rgba(255,212,0,.06),transparent 25%);
}
.machine .bulbs{display:flex;justify-content:center;gap:12px;margin-bottom:18px}
.machine .bulbs i{
  width:11px;height:11px;border-radius:50%;background:var(--giallo);
  box-shadow:0 0 12px rgba(255,212,0,.85);animation:blink 1.1s infinite;
}
.machine .bulbs i:nth-child(2){animation-delay:.18s;background:var(--ciano);box-shadow:0 0 12px rgba(55,200,239,.85)}
.machine .bulbs i:nth-child(3){animation-delay:.36s}
.machine .bulbs i:nth-child(4){animation-delay:.54s;background:var(--ciano);box-shadow:0 0 12px rgba(55,200,239,.85)}
.machine .bulbs i:nth-child(5){animation-delay:.72s}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* ---- Rullo ---- */
.reel-window{
  position:relative;height:348px;border-radius:16px;overflow:hidden;
  background:#060C22;border:1px solid var(--line);
  box-shadow:inset 0 6px 20px rgba(0,0,0,.6);
}
.reel-strip{will-change:transform;transform:translateY(0)}
.reel-item{
  height:116px;display:flex;align-items:center;gap:14px;
  padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.05);
}
.reel-item .thumb{
  width:150px;height:84px;border-radius:10px;flex:0 0 auto;
  background:#000 center/cover no-repeat;border:1px solid rgba(255,255,255,.12);
}
.reel-item .rt{
  font-family:'Lexend',sans-serif;font-weight:700;font-size:15px;line-height:1.25;
  color:#dfe8ff;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
}
/* fascia centrale evidenziata */
.reel-window::before,.reel-window::after{
  content:"";position:absolute;left:0;right:0;height:116px;z-index:3;pointer-events:none;
}
.reel-window::before{top:0;background:linear-gradient(180deg,#060C22 25%,transparent)}
.reel-window::after{bottom:0;background:linear-gradient(0deg,#060C22 25%,transparent)}
.payline{
  position:absolute;left:8px;right:8px;top:116px;height:116px;z-index:4;pointer-events:none;
  border:2.5px solid var(--giallo);border-radius:12px;
  box-shadow:0 0 0 3px rgba(255,212,0,.15),0 0 24px rgba(255,212,0,.25);
}
.payline .arrow{
  position:absolute;top:50%;transform:translateY(-50%);
  width:0;height:0;border-top:11px solid transparent;border-bottom:11px solid transparent;
}
.payline .arrow.l{left:-6px;border-left:13px solid var(--giallo)}
.payline .arrow.r{right:-6px;border-right:13px solid var(--giallo)}

/* ---- Bottone estrai ---- */
.spin-btn{
  display:block;width:100%;margin-top:22px;cursor:pointer;
  font-family:'Lexend',sans-serif;font-weight:900;font-size:22px;letter-spacing:.02em;
  color:var(--navy-900);
  background:linear-gradient(180deg,#FFE24D,var(--giallo) 55%,var(--giallo-scuro));
  border:none;border-radius:16px;padding:18px 20px;
  box-shadow:0 12px 26px rgba(255,212,0,.32),inset 0 -4px 0 rgba(0,0,0,.14);
  transition:transform .08s ease,filter .15s ease;
  text-transform:uppercase;
  display:flex;align-items:center;justify-content:center;gap:12px;
}
.spin-btn:hover{filter:brightness(1.05)}
.spin-btn:active{transform:translateY(2px)}
.spin-btn:disabled{cursor:default;filter:grayscale(.35) brightness(.85);box-shadow:none}
.spin-btn svg{width:26px;height:26px;flex:0 0 auto}
.spin-hint{text-align:center;color:var(--testo-soft);font-size:14.5px;margin-top:14px}
.spin-hint b{color:var(--giallo)}

/* ============ SCHERMATA VIDEO + ATTIVITÀ ============ */
#playScreen{display:none}
.play-grid{display:grid;grid-template-columns:1.15fr .95fr;gap:24px;align-items:start}
@media (min-width:981px){
  /* video fermo a sinistra, attività a destra con scroll indipendente */
  .video-col{position:sticky;top:20px;align-self:start}
  .activity{max-height:calc(100vh - 40px);overflow-y:auto;
    scrollbar-width:thin;scrollbar-color:var(--line) transparent}
  .activity::-webkit-scrollbar{width:10px}
  .activity::-webkit-scrollbar-track{background:transparent}
  .activity::-webkit-scrollbar-thumb{background:var(--line);border-radius:999px;border:2px solid var(--card)}
  .activity::-webkit-scrollbar-thumb:hover{background:var(--ciano-scuro)}
}
@media (max-width:980px){.play-grid{grid-template-columns:1fr}}

.video-col .cat{
  display:inline-flex;align-items:center;gap:9px;
  font-family:'Lexend',sans-serif;font-weight:800;font-size:12.5px;letter-spacing:.1em;text-transform:uppercase;
  padding:7px 13px;border-radius:999px;margin-bottom:12px;
  background:rgba(55,200,239,.14);color:var(--ciano);border:1px solid rgba(55,200,239,.35);
}
.video-col .cat .dot{width:8px;height:8px;border-radius:50%;background:var(--ciano)}
.video-col h2{font-size:23px;font-weight:800;line-height:1.15;margin-bottom:16px;color:#fff}
.player-frame{
  position:relative;width:100%;aspect-ratio:16/9;border-radius:16px;overflow:hidden;
  background:#000;border:1px solid var(--line);box-shadow:var(--ombra);
}
.player-frame #ytHolder{position:absolute;inset:0}
/* l'iframe YouTube è reso NON interagibile: niente hover-titolo, "Guarda su YouTube",
   condividi, ingranaggio impostazioni, schermo intero. I comandi sono i nostri, qui sotto. */
.player-frame iframe{position:absolute;inset:0;width:100%;height:100%;border:0;pointer-events:none}
/* poster opaco nostro: nasconde l'anteprima YouTube (titolo, avatar, "Guarda su YouTube", condividi) finché non parte */
.v-poster{position:absolute;inset:0;z-index:1;background:#000 center/cover no-repeat}
.v-poster.hide{display:none}
/* strato che cattura i clic (play/pausa) al posto di YouTube */
.v-guard{position:absolute;inset:0;z-index:2;cursor:pointer;display:flex;align-items:center;justify-content:center;background:transparent}
.v-big{
  width:80px;height:80px;border-radius:50%;border:none;cursor:pointer;
  background:rgba(255,212,0,.96);color:var(--navy-900);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 12px 32px rgba(0,0,0,.45);transition:transform .12s,opacity .22s;
}
.v-big svg{width:36px;height:36px;margin-left:3px}
.v-big:hover{transform:scale(1.06)}
.v-guard.playing .v-big{opacity:0;pointer-events:none;transform:scale(.8)}
.v-end{
  position:absolute;inset:0;z-index:3;display:none;align-items:center;justify-content:center;
  background:rgba(10,19,48,.985);
}
.v-end.show{display:flex}
.v-replay{
  display:inline-flex;align-items:center;gap:10px;cursor:pointer;
  font-family:'Lexend',sans-serif;font-weight:800;font-size:17px;color:var(--navy-900);
  background:var(--giallo);border:none;border-radius:12px;padding:13px 20px;box-shadow:0 8px 20px rgba(255,212,0,.3);
}
.v-replay svg{width:22px;height:22px}
.v-bar{
  position:absolute;left:0;right:0;bottom:0;z-index:4;
  display:flex;align-items:center;gap:12px;padding:14px 14px 13px;
  background:linear-gradient(0deg,rgba(6,12,34,.94),rgba(6,12,34,.55) 60%,transparent);
  opacity:0;transition:opacity .2s ease;
}
.player-frame:hover .v-bar,.v-bar.stick{opacity:1}
.v-bar button{background:none;border:none;cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center;padding:4px}
.v-bar button svg{width:24px;height:24px}
.v-bar button:hover{color:var(--giallo)}
.v-t{font-family:'Lexend',sans-serif;font-weight:700;font-size:13px;color:#dfe8ff;min-width:42px;text-align:center;font-variant-numeric:tabular-nums}
/* barra = solo indicatore di avanzamento: NON trascinabile (no skip della timeline) */
.v-seek{
  -webkit-appearance:none;appearance:none;flex:1;height:6px;border-radius:999px;
  cursor:default;pointer-events:none;
  background:linear-gradient(90deg,var(--giallo) 0%,rgba(255,255,255,.25) 0%);
}
.v-seek::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--giallo);border:2px solid #fff}
.v-seek::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--giallo);border:none}
.again-btn{
  margin-top:18px;cursor:pointer;
  font-family:'Lexend',sans-serif;font-weight:800;font-size:16px;
  color:var(--navy-900);background:var(--giallo);border:none;border-radius:12px;
  padding:13px 20px;display:inline-flex;align-items:center;gap:10px;
  box-shadow:0 8px 20px rgba(255,212,0,.28);transition:transform .08s,filter .15s;
}
.again-btn:hover{filter:brightness(1.05)}
.again-btn:active{transform:translateY(2px)}
.again-btn svg{width:20px;height:20px}
/* ---- Verifica bloccata finché la videolezione non è finita ---- */
.quiz-lock{
  display:flex;align-items:center;gap:10px;margin:6px 0 14px;
  background:rgba(255,176,32,.12);border:1px solid rgba(255,176,32,.4);border-radius:12px;
  padding:11px 13px;font-size:15px;color:var(--testo);
}
.quiz-lock svg{width:20px;height:20px;flex:0 0 auto;color:var(--ambra)}
.quiz-lock.done{background:rgba(47,191,113,.13);border-color:rgba(47,191,113,.4)}
.quiz-lock.done svg{color:var(--verde)}
.quiz-wrap.locked{opacity:.5;pointer-events:none;filter:saturate(.55);user-select:none}

/* ---- Pannello attività ---- */
.activity{
  background:linear-gradient(180deg,var(--card),var(--card-2));
  border:1px solid var(--line);border-radius:var(--radius);
  padding:22px 22px 24px;box-shadow:var(--ombra);
}
.a-block{padding:18px 0;border-top:1px solid var(--line)}
.a-block:first-child{padding-top:2px;border-top:none}
.a-label{
  display:flex;align-items:center;gap:10px;margin-bottom:12px;
  font-family:'Lexend',sans-serif;font-weight:800;font-size:13px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--giallo);
}
.a-label .n{
  width:26px;height:26px;border-radius:8px;flex:0 0 auto;
  background:var(--giallo);color:var(--navy-900);
  display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;
}
.a-intro{color:var(--testo);font-size:17px}
.watch-list{list-style:none;display:flex;flex-direction:column;gap:10px;margin-top:4px}
.watch-list li{
  display:flex;align-items:flex-start;gap:11px;
  background:var(--navy-700);border:1px solid var(--line);border-radius:12px;padding:11px 13px;
}
.watch-list li .eye{width:20px;height:20px;flex:0 0 auto;margin-top:2px;color:var(--ciano)}
.watch-list li span{font-size:15.5px;color:var(--testo)}

/* ---- Quiz ---- */
.quiz-progress{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.qp-bar{flex:1;height:9px;background:var(--navy-700);border-radius:999px;overflow:hidden}
.qp-fill{height:100%;width:0;background:linear-gradient(90deg,var(--ciano),var(--giallo));transition:width .4s ease}
.qp-txt{font-family:'Lexend',sans-serif;font-weight:800;font-size:13px;color:var(--testo-soft)}
.question{margin-top:14px}
.question .q{font-family:'Lexend',sans-serif;font-weight:700;font-size:17px;margin-bottom:11px;color:#fff}
.opts{display:flex;flex-direction:column;gap:9px}
.opt{
  text-align:left;cursor:pointer;font-family:inherit;font-size:16px;color:var(--testo);
  background:var(--navy-700);border:1.5px solid var(--line);border-radius:12px;
  padding:12px 14px;display:flex;align-items:center;gap:12px;transition:all .13s ease;
}
.opt:hover:not(:disabled){border-color:var(--ciano);background:var(--navy-600)}
.opt:disabled{cursor:default}
.opt .tick{
  width:22px;height:22px;flex:0 0 auto;border-radius:50%;
  border:2px solid var(--testo-soft);display:flex;align-items:center;justify-content:center;
}
.opt .tick svg{width:13px;height:13px;opacity:0}
.opt.correct{border-color:var(--verde);background:rgba(47,191,113,.15)}
.opt.correct .tick{border-color:var(--verde);background:var(--verde)}
.opt.correct .tick svg{opacity:1;color:#04220f}
.opt.wrong{border-color:var(--ambra);background:rgba(255,176,32,.14)}
.opt.wrong .tick{border-color:var(--ambra)}
.opt.dim{opacity:.55}
.feedback{
  margin-top:11px;border-radius:12px;padding:12px 14px;font-size:15.5px;
  display:none;align-items:flex-start;gap:10px;
}
.feedback.show{display:flex}
.feedback.ok{background:rgba(47,191,113,.13);border:1px solid rgba(47,191,113,.4)}
.feedback.retry{background:rgba(255,176,32,.12);border:1px solid rgba(255,176,32,.4)}
.feedback svg{width:20px;height:20px;flex:0 0 auto;margin-top:1px}
.feedback.ok svg{color:var(--verde)}
.feedback.retry svg{color:var(--ambra)}

/* ---- Azione finale ---- */
.action-card{
  display:none;margin-top:8px;
  background:linear-gradient(135deg,rgba(255,212,0,.14),rgba(55,200,239,.10));
  border:1px solid rgba(255,212,0,.4);border-radius:16px;padding:18px 18px 20px;
}
.action-card.show{display:block;animation:pop .35s ease}
@keyframes pop{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.action-card .ac-head{
  display:flex;align-items:center;gap:11px;margin-bottom:10px;
  font-family:'Lexend',sans-serif;font-weight:900;font-size:16px;color:var(--giallo);
}
.action-card .ac-head svg{width:24px;height:24px}
.action-card p{font-size:16px;color:var(--testo)}
.score-badge{
  display:none;margin-top:14px;align-items:center;gap:12px;
  background:var(--navy-700);border:1px solid var(--line);border-radius:12px;padding:12px 15px;
}
.score-badge.show{display:flex}
.score-badge .medal{width:34px;height:34px;flex:0 0 auto;color:var(--giallo)}
.score-badge b{font-family:'Lexend',sans-serif;font-size:18px;color:#fff}
.score-badge small{display:block;color:var(--testo-soft);font-size:13.5px}

footer.credits{text-align:center;margin-top:44px;color:var(--testo-soft);font-size:13.5px}
footer.credits b{color:var(--giallo)}
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <div class="brand">
      <div class="mark" aria-hidden="true">
        <!-- lente/pop: SVG inline, niente emoji -->
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="10.5" cy="10.5" r="6.5" stroke="#0A1330" stroke-width="2.4"/>
          <path d="M15.5 15.5 L21 21" stroke="#0A1330" stroke-width="2.8" stroke-linecap="round"/>
          <circle cx="10.5" cy="10.5" r="2.2" fill="#0A1330"/>
        </svg>
      </div>
      <div class="txt">
        <b>Geopop Tech</b>
      </div>
    </div>
    <div class="kicker">Scuola Sacra Famiglia</div>
  </header>

  <!-- ============ SCHERMATA SLOT ============ -->
  <section id="slotScreen">
    <div class="hero-head">
      <h1>Random <span class="hl">videolezioni</span></h1>
    </div>

    <div class="machine">
      <div class="bulbs" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i></div>
      <div class="reel-window">
        <div class="reel-strip" id="reelStrip"></div>
        <div class="payline"><span class="arrow l"></span><span class="arrow r"></span></div>
      </div>

      <button class="spin-btn" id="spinBtn">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 4V2M12 4a8 8 0 1 0 8 8" stroke="#0A1330" stroke-width="2.6" stroke-linecap="round"/>
          <path d="M12 4l3 2.4L12 9" stroke="#0A1330" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span id="spinLabel">Estrai un video</span>
      </button>
      <div class="spin-hint">Tredici pillole — IA, truffe online, privacy, tecnologia — <b>una diversa a ogni estrazione</b>.</div>
    </div>
  </section>

  <!-- ============ SCHERMATA VIDEO + ATTIVITÀ ============ -->
  <section id="playScreen">
    <div class="play-grid">
      <div class="video-col">
        <div class="cat" id="catBadge"><span class="dot"></span><span id="catText"></span></div>
        <h2 id="videoTitle"></h2>
        <div class="player-frame"><div id="ytHolder"></div></div>
        <button class="again-btn" id="againBtn">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 12a8 8 0 1 1 2.3 5.6M4 12V7M4 12h5" stroke="#0A1330" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>Estrai un altro video</span>
        </button>
      </div>

      <div class="activity" id="activityPanel"><!-- riempito da JS --></div>
    </div>
  </section>

  <footer class="credits">
    Contenuti video: canale <b>Geopop</b> · Attività didattica a cura della Scuola Sacra Famiglia di Orzinuovi
  </footer>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
/* ================= DATI VIDEO + ATTIVITÀ =================
   Le domande vertono sui FATTI DEFINITORI di ogni argomento
   (ciò che il video certamente tratta): niente timestamp o
   citazioni inventate. Feedback: verde/ambra, mai rosso. */
const VIDEOS = [
  {
    id:"-D2kPFkwTmg",

/* ================= SLOT MACHINE ================= */
const ITEM_H = 116;
const CYCLES = 9;
const strip = document.getElementById('reelStrip');
const spinBtn = document.getElementById('spinBtn');
const spinLabel = document.getElementById('spinLabel');
let lastIndex = -1;
let spinning = false;

function thumbUrl(id){ return 'https://i.ytimg.com/vi/'+id+'/mqdefault.jpg'; }

function makeItem(v){
  const el = document.createElement('div');
  el.className = 'reel-item';
  el.innerHTML =
    '<div class="thumb" style="background-image:url('+thumbUrl(v.id)+')"></div>'+
    '<div class="rt">'+v.title+'</div>';
  return el;
}

function fillInitial(){
  strip.style.transition = 'none';
  strip.style.transform = 'translateY(0)';
  strip.innerHTML = '';
  // riempimento statico iniziale (mostra 3 righe)
  for(let i=0;i<VIDEOS.length;i++) strip.appendChild(makeItem(VIDEOS[i]));
}

/* ---- Effetto sonoro slot machine (sintetizzato, nessun file esterno) ---- */
let audioCtx = null;
function ensureAudio(){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === 'suspended') audioCtx.resume();
  }catch(e){ audioCtx = null; }
  return audioCtx;
}
function slotTick(ctx, t, freq, gain){
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.type = 'square';
  o.frequency.setValueAtTime(freq, t);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(gain, t + 0.001);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.045);
  o.connect(g).connect(ctx.destination);
  o.start(t); o.stop(t + 0.05);
}
function slotChime(ctx, t){
  [[659.25, 0], [987.77, 0.12]].forEach(([f, dt])=>{
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = 'triangle';
    o.frequency.setValueAtTime(f, t + dt);
    g.gain.setValueAtTime(0.0001, t + dt);
    g.gain.linearRampToValueAtTime(0.22, t + dt + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dt + 0.5);
    o.connect(g).connect(ctx.destination);
    o.start(t + dt); o.stop(t + dt + 0.55);
  });
}
function playSlotSound(durationSec){
  const ctx = ensureAudio();
  if(!ctx) return;
  const start = ctx.currentTime + 0.02;
  const N = 44;
  for(let i=0;i<N;i++){
    const x = i/(N-1);
    const tt = Math.pow(x, 2.2) * durationSec;   // tick fitti all'avvio, radi mentre rallenta
    const freq = 1500 - (tt/durationSec)*620 + (i%2 ? 90 : 0);
    slotTick(ctx, start + tt, freq, 0.09);
  }
  slotChime(ctx, start + durationSec + 0.02);     // "din" quando si ferma
}

function spin(){
  if(spinning) return;
  spinning = true;
  spinBtn.disabled = true;
  spinLabel.textContent = 'Estrazione…';
  playSlotSound(3.4);

  // estrazione libera e casuale, solo diversa dall'ultima estratta
  let target;
  do { target = Math.floor(Math.random()*VIDEOS.length); }
  while(VIDEOS.length>1 && target===lastIndex);
  lastIndex = target;

  // costruisci la striscia: CYCLES giri + landing
  strip.style.transition = 'none';
  strip.style.transform = 'translateY(0)';
  strip.innerHTML = '';
  const seq = [];
  for(let c=0;c<CYCLES;c++) for(let i=0;i<VIDEOS.length;i++) seq.push(i);
  seq.push((target - 1 + VIDEOS.length)%VIDEOS.length); // riga sopra
  const targetPos = seq.length;                          // posizione del target
  seq.push(target);                                      // TARGET (riga centrale)
  seq.push((target + 1)%VIDEOS.length);                  // riga sotto
  seq.forEach(i => strip.appendChild(makeItem(VIDEOS[i])));

  // forza reflow, poi anima verso il target (che finisce nella payline centrale)
  void strip.offsetHeight;
  const finalY = -(targetPos - 1) * ITEM_H; // -1 perché la payline è la 2ª riga della finestra
  strip.style.transition = 'transform 3.4s cubic-bezier(.15,.85,.2,1)';
  strip.style.transform = 'translateY('+finalY+'px)';

  const done = () => {
    strip.removeEventListener('transitionend', done);
    spinning = false;
    setTimeout(()=>openVideo(target), 260);
  };
  strip.addEventListener('transitionend', done);
}

spinBtn.addEventListener('click', spin);

/* ================= PLAYER + ATTIVITÀ ================= */
const slotScreen = document.getElementById('slotScreen');
const playScreen = document.getElementById('playScreen');
const activityPanel = document.getElementById('activityPanel');
let ytPlayer = null;
let apiReady = false;
let pendingId = null;
let pollTimer = null;
let scrubbing = false;
let vidDur = 0;

window.onYouTubeIframeAPIReady = function(){
  apiReady = true;
  if(pendingId){ const p = pendingId; pendingId = null; buildPlayer(p); }
};

function fmtTime(s){
  s = Math.max(0, Math.floor(s||0));
  const m = Math.floor(s/60), ss = String(s%60).padStart(2,'0');
  return m+':'+ss;
}
function paintSeek(pct){
  const seek = document.getElementById('vSeek');
  if(seek) seek.style.background =
    'linear-gradient(90deg,var(--giallo) '+pct+'%,rgba(255,255,255,.25) '+pct+'%)';
}
function stopPoll(){ if(pollTimer){ clearInterval(pollTimer); pollTimer = null; } }
function startPoll(){
  stopPoll();
  pollTimer = setInterval(()=>{
    if(scrubbing || !ytPlayer || !ytPlayer.getCurrentTime) return;
    if(!vidDur) vidDur = ytPlayer.getDuration() || 0;
    const t = ytPlayer.getCurrentTime() || 0;
    const seek = document.getElementById('vSeek');
    const cur = document.getElementById('vCur');
    if(seek && vidDur){ const p = t/vidDur*1000; seek.value = p; paintSeek(p/10); }
    if(cur) cur.textContent = fmtTime(t);
    // visione (quasi) completa → sblocca la verifica (fallback se ENDED non scatta)
    if(vidDur && t >= vidDur - 1.5) unlockQuiz();
  }, 250);
}

// Player YouTube "senza distrattori": controls=0 (niente ingranaggio/fullscreen/logo),
// iframe non cliccabile, comandi ricostruiti da noi (play/pausa, barra, audio).
function buildPlayer(id){
  const holder = document.getElementById('ytHolder');
  stopPoll(); vidDur = 0; scrubbing = false;
  holder.innerHTML =
    '<div id="ytPlayerMount"></div>'+
    '<div class="v-poster" id="vPoster" style="background-image:url(https://i.ytimg.com/vi/'+id+'/hqdefault.jpg)"></div>'+
    '<div class="v-guard" id="vGuard"><button class="v-big" id="vBig" aria-label="Riproduci il video">'+
      '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button></div>'+
    '<div class="v-end" id="vEnd"><button class="v-replay" id="vReplay">'+
      '<svg viewBox="0 0 24 24" fill="none"><path d="M4 12a8 8 0 1 1 2.3 5.6M4 12V7M4 12h5" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>Rivedi il video</button></div>'+
    '<div class="v-bar" id="vBar">'+
      '<button id="vPP" aria-label="Play o pausa"><svg id="vPPIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button>'+
      '<span class="v-t" id="vCur">0:00</span>'+
      '<input type="range" class="v-seek" id="vSeek" min="0" max="1000" value="0" step="1" tabindex="-1" aria-label="Avanzamento del video (non modificabile)" aria-readonly="true">'+
      '<span class="v-t" id="vDur">0:00</span>'+
      '<button id="vMute" aria-label="Attiva o disattiva audio"><svg id="vMuteIcon" viewBox="0 0 24 24" fill="none"><path d="M4 9v6h3.5L9 19V5L7.5 9H4Z" fill="currentColor"/><path d="M14 8.5a4 4 0 0 1 0 7M16.5 6a7 7 0 0 1 0 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></button>'+
    '</div>';

  if(!(apiReady && window.YT && YT.Player)){ pendingId = id; return; }
  pendingId = null;
  ytPlayer = new YT.Player('ytPlayerMount', {
    videoId: id,
    playerVars:{
      controls:0, rel:0, fs:0, disablekb:1, modestbranding:1,
      iv_load_policy:3, playsinline:1, cc_load_policy:1, cc_lang_pref:'it',
      hl:'it', color:'white'
    },
    events:{ onReady:onYtReady, onStateChange:onYtState }
  });
}

function togglePlay(){
  if(!ytPlayer || !ytPlayer.getPlayerState) return;
  const S = YT.PlayerState;
  if(ytPlayer.getPlayerState() === S.PLAYING) ytPlayer.pauseVideo();
  else ytPlayer.playVideo();
}
function setMuteIcon(muted){
  const el = document.getElementById('vMuteIcon');
  if(!el) return;
  el.innerHTML = muted
    ? '<path d="M4 9v6h3.5L9 19V5L7.5 9H4Z" fill="currentColor"/><path d="M15 9l5 6M20 9l-5 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>'
    : '<path d="M4 9v6h3.5L9 19V5L7.5 9H4Z" fill="currentColor"/><path d="M14 8.5a4 4 0 0 1 0 7M16.5 6a7 7 0 0 1 0 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>';
}

function onYtReady(){
  vidDur = ytPlayer.getDuration() || 0;
  const dEl = document.getElementById('vDur');
  if(dEl) dEl.textContent = fmtTime(vidDur);
  const guard = document.getElementById('vGuard');
  const big = document.getElementById('vBig');
  const pp = document.getElementById('vPP');
  const mute = document.getElementById('vMute');
  const replay = document.getElementById('vReplay');
  guard.addEventListener('click', togglePlay);
  big.addEventListener('click', (e)=>{ e.stopPropagation(); togglePlay(); });
  pp.addEventListener('click', togglePlay);
  mute.addEventListener('click', ()=>{
    if(ytPlayer.isMuted()){ ytPlayer.unMute(); setMuteIcon(false); }
    else { ytPlayer.mute(); setMuteIcon(true); }
  });
  replay.addEventListener('click', (e)=>{
    e.stopPropagation();
    ytPlayer.seekTo(0, true); ytPlayer.playVideo();
    document.getElementById('vEnd').classList.remove('show');
  });
  // Nessun listener sulla barra: la timeline NON è trascinabile (no skip).
}

function onYtState(e){
  const guard = document.getElementById('vGuard');
  const ppIcon = document.getElementById('vPPIcon');
  const end = document.getElementById('vEnd');
  const bar = document.getElementById('vBar');
  if(!guard) return;
  const S = YT.PlayerState;
  if(e.data === S.PLAYING){
    guard.classList.add('playing');
    const poster = document.getElementById('vPoster');
    if(poster) poster.classList.add('hide');
    if(bar) bar.classList.remove('stick');
    ppIcon.innerHTML = '<path d="M7 5h3.5v14H7zM13.5 5H17v14h-3.5z"/>';
    end.classList.remove('show');
    if(!vidDur){ vidDur = ytPlayer.getDuration() || 0; document.getElementById('vDur').textContent = fmtTime(vidDur); }
    startPoll();
  } else if(e.data === S.PAUSED){
    guard.classList.remove('playing');
    if(bar) bar.classList.add('stick');
    ppIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
    stopPoll();
  } else if(e.data === S.ENDED){
    guard.classList.remove('playing');
    if(bar) bar.classList.add('stick');
    ppIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
    end.classList.add('show');
    stopPoll();
    unlockQuiz();               // visione completa → verifica sbloccata
  }
}

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderActivity(v){
  const watchItems = v.watch.map(w =>
    '<li><svg class="eye" viewBox="0 0 24 24" fill="none"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg><span>'+esc(w)+'</span></li>'
  ).join('');

  const quizHtml = v.quiz.map((q,qi)=>{
    const opts = q.opts.map((o,oi)=>
      '<button class="opt" data-q="'+qi+'" data-o="'+oi+'">'+
        '<span class="tick"><svg viewBox="0 0 24 24" fill="none"><path d="M4 12l5 5L20 6" stroke="currentColor" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/></svg></span>'+
        '<span>'+esc(o)+'</span>'+
      '</button>'
    ).join('');
    return '<div class="question" data-qi="'+qi+'">'+
             '<div class="q">'+(qi+1)+'. '+esc(q.q)+'</div>'+
             '<div class="opts">'+opts+'</div>'+
             '<div class="feedback"><svg viewBox="0 0 24 24" fill="none"><path class="fbi" d="" /></svg><span class="fbtext"></span></div>'+
           '</div>';
  }).join('');

  activityPanel.innerHTML =
    '<div class="a-block">'+
      '<div class="a-label"><span class="n">1</span>Prima di guardare</div>'+
      '<p class="a-intro">'+esc(v.intro)+'</p>'+
    '</div>'+
    '<div class="a-block">'+
      '<div class="a-label"><span class="n">2</span>Mentre guardi, osserva</div>'+
      '<ul class="watch-list">'+watchItems+'</ul>'+
    '</div>'+
    '<div class="a-block">'+
      '<div class="a-label"><span class="n">3</span>Verifica quello che hai capito</div>'+
      '<div class="quiz-lock" id="quizLock">'+
        '<svg viewBox="0 0 24 24" fill="none"><path d="M6 10V8a6 6 0 0 1 12 0v2M5 10h14v9a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1v-9Z" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>'+
        '<span>Guarda la videolezione fino in fondo per sbloccare la verifica.</span>'+
      '</div>'+
      '<div class="quiz-wrap locked" id="quizWrap">'+
        '<div class="quiz-progress"><div class="qp-bar"><div class="qp-fill" id="qpFill"></div></div><span class="qp-txt" id="qpTxt">0/'+v.quiz.length+'</span></div>'+
        quizHtml+
        '<div class="score-badge" id="scoreBadge">'+
          '<svg class="medal" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="9" r="6" stroke="currentColor" stroke-width="2"/><path d="M8.5 14.5 7 22l5-3 5 3-1.5-7.5" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M9.5 9l1.7 1.7L15 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>'+
          '<div><b id="scoreTxt"></b><small id="scoreSub"></small></div>'+
        '</div>'+
      '</div>'+
    '</div>'+
    '<div class="a-block">'+
      '<div class="a-label"><span class="n">4</span>L\'idea diventa azione</div>'+
      '<div class="action-card" id="actionCard">'+
        '<div class="ac-head"><svg viewBox="0 0 24 24" fill="none"><path d="M9 18h6M10 21h4M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.2 1 2h6c0-.8.4-1.5 1-2A7 7 0 0 0 12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>Il tuo compito</div>'+
        '<p>'+esc(v.action)+'</p>'+
      '</div>'+
      '<p class="a-intro" id="actionLocked" style="color:var(--testo-soft);font-size:15px">Completa la verifica per sbloccare il compito pratico.</p>'+
    '</div>';

  // logica quiz
  const total = v.quiz.length;
  let answered = 0, correctCount = 0;
  const answeredSet = new Set();
  const fill = document.getElementById('qpFill');
  const txt = document.getElementById('qpTxt');

  activityPanel.querySelectorAll('.opt').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const qi = +btn.dataset.q, oi = +btn.dataset.o;
      if(answeredSet.has(qi)) return;
      answeredSet.add(qi);
      const q = v.quiz[qi];
      const qBlock = activityPanel.querySelector('.question[data-qi="'+qi+'"]');
      const isRight = oi === q.correct;
      if(isRight) correctCount++;
      // marca opzioni
      qBlock.querySelectorAll('.opt').forEach(b=>{
        const bo = +b.dataset.o;
        b.disabled = true;
        if(bo === q.correct) b.classList.add('correct');
        else if(bo === oi) b.classList.add('wrong');
        else b.classList.add('dim');
      });
      // feedback
      const fbBox = qBlock.querySelector('.feedback');
      const fbTextEl = qBlock.querySelector('.fbtext');
      const fbPath = qBlock.querySelector('.fbi');
      if(isRight){
        fbBox.classList.add('show','ok');
        fbPath.setAttribute('d','M4 12l5 5L20 6');
        fbPath.setAttribute('stroke','currentColor');
        fbPath.setAttribute('stroke-width','3');
        fbPath.setAttribute('stroke-linecap','round');
        fbPath.setAttribute('stroke-linejoin','round');
        fbTextEl.textContent = q.fb;
      } else {
        fbBox.classList.add('show','retry');
        fbPath.setAttribute('d','M12 8v5M12 16.5v.01M10.3 3.9 2.4 18a1.8 1.8 0 0 0 1.6 2.7h16a1.8 1.8 0 0 0 1.6-2.7L13.7 3.9a1.8 1.8 0 0 0-3.4 0Z');
        fbPath.setAttribute('stroke','currentColor');
        fbPath.setAttribute('stroke-width','2');
        fbPath.setAttribute('stroke-linecap','round');
        fbPath.setAttribute('stroke-linejoin','round');
        // toglie l'affermazione iniziale ("Esatto:/Sì:/Corretto:") dalla spiegazione
        const spieg = q.fb.replace(/^(esatto|s[iì]|corretto|giusto)[:!,.]?\s*/i,'');
        fbTextEl.textContent = 'La risposta corretta è evidenziata in verde. ' + spieg.charAt(0).toUpperCase() + spieg.slice(1);
      }
      answered++;
      fill.style.width = (answered/total*100)+'%';
      txt.textContent = answered+'/'+total;

      if(answered === total){
        document.getElementById('actionCard').classList.add('show');
        const lock = document.getElementById('actionLocked');
        if(lock) lock.style.display='none';
        const badge = document.getElementById('scoreBadge');
        badge.classList.add('show');
        document.getElementById('scoreTxt').textContent = 'Verifica completata: '+correctCount+'/'+total+' al primo colpo';
        document.getElementById('scoreSub').textContent = correctCount===total
          ? 'Ottimo: hai colto tutti i punti chiave del video.'
          : 'Bene: rivedi i passaggi segnalati in ambra e sei a posto.';
      }
    });
  });
}

// Sblocca la verifica: si può rispondere solo dopo aver guardato il video fino in fondo
function unlockQuiz(){
  const w = document.getElementById('quizWrap');
  const l = document.getElementById('quizLock');
  if(w) w.classList.remove('locked');
  if(l){
    l.classList.add('done');
    l.innerHTML = '<svg viewBox="0 0 24 24" fill="none"><path d="M4 12l5 5L20 6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>'+
      '<span>Videolezione conclusa: ora puoi fare la verifica.</span>';
  }
}

function openVideo(index){
  const v = VIDEOS[index];
  document.getElementById('catText').textContent = v.cat;
  document.getElementById('videoTitle').textContent = v.title;
  renderActivity(v);
  buildPlayer(v.id);
  slotScreen.style.display = 'none';
  playScreen.style.display = 'block';
  spinBtn.disabled = false;
  spinLabel.textContent = 'Estrai un video';
  window.scrollTo({top:0, behavior:'smooth'});
}

document.getElementById('againBtn').addEventListener('click', ()=>{
  // ferma il video
  stopPoll(); vidDur = 0; scrubbing = false;
  try{ if(ytPlayer && ytPlayer.stopVideo) ytPlayer.stopVideo(); }catch(e){}
  document.getElementById('ytHolder').innerHTML = '';
  ytPlayer = null;
  playScreen.style.display = 'none';
  slotScreen.style.display = 'block';
  fillInitial();
  window.scrollTo({top:0, behavior:'smooth'});
});

// init
fillInitial();
</script>
